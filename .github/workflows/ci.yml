name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase db start

      - name: Install dependencies
        run: pnpm install

      - name: Generate Supabase types
        run: |
          mkdir -p types
          supabase gen types typescript --local > types/supabase.ts

      - name: Format generated types
        run: pnpm exec prettier --write types/supabase.ts

      - name: Verify generated types are committed
        run: |
          if ! git diff  --ignore-space-at-eol --exit-code types/supabase.ts; then
            echo "Error: Database types are out of sync"
            echo "Run: supabase gen types typescript --local > types/supabase.ts"
            exit 1
          fi

      - name: Run CI checks
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

          # Forked PRs do not receive repository secrets, so fall back to safe
          # placeholders instead of leaving the env vars empty.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || 'mock-telegram-bot-token' }}
          TELEGRAM_WEBHOOK_SECRET_TOKEN: ${{ secrets.TELEGRAM_WEBHOOK_SECRET_TOKEN || 'mock-webhook-secret-token' }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME || 'project_hermes_bot' }}

          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY || 'mock-google-api-key' }}
        run: pnpm run ci
